  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

sition\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.5),transparent 42%,rgba(0,0,0,.32));pointer-events:none\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div ref=\"{{ setScrollEl }}\" style=\"flex:1;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:2\">\n    <div style=\"{{ wrapperStyle }}\">\n\n      <div style=\"{{ rulerRowStyle }}\">\n        <div style=\"{{ cornerStyle }}\">\n          <span style=\"font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.16em;opacity:.5\">STAGE / ČAS<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"{{ rulerTrackStyle }}\">\n          <sc-for list=\"{{ ticks }}\" as=\"t\" hint-placeholder-count=\"20\">\n            <div style=\"{{ t.style }}\"><span style=\"{{ t.labelStyle }}\">{{ t.label }}<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"{{ nowPillStyle }}\">{{ nowLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-for list=\"{{ lanes }}\" as=\"lane\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex\">\n          <div style=\"{{ lane.labelStyle }}\">\n            <span style=\"{{ lane.dotStyle }}\"><\u002Fspan>\n            <span style=\"{{ lane.nameStyle }}\">{{ lane.name }}<\u002Fspan>\n            <span style=\"font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.06em;opacity:.55\">{{ lane.hours }}h<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"{{ lane.trackStyle }}\">\n            <sc-for list=\"{{ lane.blocks }}\" as=\"b\" hint-placeholder-count=\"3\">\n              <div style=\"{{ b.style }}\">\n                <div style=\"display:flex;align-items:center;gap:5px\">\n                  <sc-if value=\"{{ b.showBadge }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"width:7px;height:7px;border-radius:50%;background:#FF3B3B;animation:blink 1s steps(1) infinite;flex:none\"><\u002Fspan>\n                  <\u002Fsc-if>\n                  <span style=\"{{ b.timeStyle }}\">{{ b.time }}<\u002Fspan>\n                  <sc-if value=\"{{ b.isLive }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"{{ b.liveStyle }}\">LIVE<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"{{ b.nameStyle }}\">{{ b.name }}<\u002Fdiv>\n                <sc-if value=\"{{ b.hasSub }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"{{ b.subStyle }}\">{{ b.subLine }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ b.hasTag }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"{{ b.tagStyle }}\">{{ b.tag }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"{{ nowLineStyle }}\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ showGrain }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"{{ grainStyle }}\"><\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:412,&quot;height&quot;:880},&quot;demoNow&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showGrain&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.PXH = 168;       // px per hour\n    this.SPAN = 19;       // 13:00 Sat -> 08:00 Sun\n    this.CORNER = 118;    // frozen stage-label column\n    this.LANE = 80;       // lane height\n    this.RULER = 38;      // time axis height\n    this.state = { now: this._getNow() };\n    this.setScrollEl = (el) => { this.scrollEl = el; };\n    this.setDiscoEl = (el) => { this.discoEl = el; };\n    this._lastX = -1;\n    this._spin = () => {\n      this._raf = requestAnimationFrame(this._spin);\n      if (!this.discoEl || !this.scrollEl) return;\n      const x = this.scrollEl.scrollLeft;\n      if (x === this._lastX) return;\n      this._lastX = x;\n      // spin the mirror-ball light as the schedule moves left/right\n      this.discoEl.style.backgroundPositionX = (-x * 0.85) + 'px';\n    };\n  }\n\n  _pad(n){ return (n < 10 ? '0' : '') + n; }\n  _hhmm(d){ return this._pad(d.getHours()) + ':' + this._pad(d.getMinutes()); }\n  _mk(hh, mm){ const day = hh < 12 ? 21 : 20; return new Date(2026, 5, day, hh, mm, 0, 0); }\n  _parse(str){ const p = str.split(':'); return this._mk(+p[0], +p[1]); }\n  _base(){ return new Date(2026,5,20,13,0,0,0); }\n  _off(d){ return (d - this._base())/3600000; }\n  _getNow(){\n    const ov = (this.props && this.props.demoNow) || '';\n    let q = '';\n    try { q = new URLSearchParams(location.search).get('now') || ''; } catch(e){}\n    const src = (ov || q).trim();\n    if (/^\\d{1,2}:\\d{2}$/.test(src)) { const p = src.split(':'); return this._mk(+p[0], +p[1]); }\n    return new Date();\n  }\n\n  _h(c){ c = c.replace('#',''); return [parseInt(c.slice(0,2),16), parseInt(c.slice(2,4),16), parseInt(c.slice(4,6),16)]; }\n  _lt(c1,c2,t){ const a=this._h(c1), b=this._h(c2); const f=(x,y)=>Math.round(x+(y-x)*t); return [f(a[0],b[0]),f(a[1],b[1]),f(a[2],b[2])]; }\n  _rgb(t){ return 'rgb('+t[0]+','+t[1]+','+t[2]+')'; }\n  _rgba(t,a){ return 'rgba('+t[0]+','+t[1]+','+t[2]+','+a+')'; }\n  _ra(hex,a){ return this._rgba(this._h(hex), a); }\n  _blend(hexA, rgbB, a){ const A=this._h(hexA); const f=(x,y)=>Math.round(x*a+y*(1-a)); return this._rgb([f(A[0],rgbB[0]),f(A[1],rgbB[1]),f(A[2],rgbB[2])]); }\n  _smooth(x){ x=Math.max(0,Math.min(1,x)); return x*x*(3-2*x); }\n\n  _nightness(d){\n    const base = new Date(2026,5,20,0,0,0,0);\n    const h = (d - base)/3600000;\n    if (h <= 19) return 0;\n    if (h < 21) return this._smooth((h-19)/2);\n    if (h <= 29) return 1;\n    if (h < 32) return 1 - this._smooth((h-29)/3);\n    return 0;\n  }\n  _applyVars(){\n    const t = this._nightness(this.state.now);\n    const ink = this._lt('#17131F','#F3E9D2', t);\n    const r = document.documentElement.style;\n    r.setProperty('--paper', this._rgb(this._lt('#EFE3C8','#0B0A16', t)));\n    r.setProperty('--card',  this._rgb(this._lt('#FBF4E1','#181527', t)));\n    r.setProperty('--ink',   this._rgb(ink));\n    r.setProperty('--line',  this._rgba(ink, 0.16));\n    r.setProperty('--sky1',  this._rgb(this._lt('#A9D4FF','#171247', t)));\n    r.setProperty('--sky2',  this._rgb(this._lt('#FFE3A6','#46205F', t)));\n  }\n\n  componentDidMount(){\n    try { document.title = 'KOMIKS'; } catch(e){}\n    this._applyVars();\n    this.timer = setInterval(() => { this.setState({ now: this._getNow() }); this._applyVars(); }, 15000);\n    setTimeout(() => { this._autoScroll(); }, 50);\n    this._raf = requestAnimationFrame(this._spin);\n  }\n  componentWillUnmount(){ clearInterval(this.timer); if (this._raf) cancelAnimationFrame(this._raf); }\n  _autoScroll(){\n    if (!this.scrollEl) return;\n    const off = Math.max(0, Math.min(this.SPAN, this._off(this.state.now)));\n    const nowX = this.CORNER + off*this.PXH;\n    const target = Math.max(0, nowX - this.scrollEl.clientWidth*0.32);\n    this.scrollEl.scrollLeft = target;\n  }\n\n  _stages(){\n    const A = (s,e,name,sub,tag) => ({ start:this._parse(s), end:this._parse(e), name, sub, tag });\n    return [\n      { name:'KOMIKS GARDEN', ink:'#5BB237', onInk:'#06120A', hours:'13–22', acts:[\n        A('13:00','16:00','SHURIGEN B2B DEMONIKA'),\n        A('16:00','17:00','ROMAN RAI — LIVE'),\n        A('17:00','19:30','PSJ B2B FATTY M'),\n        A('19:30','22:00','JOHN TALABOT'),\n      ]},\n      { name:'COMPACT DISCO TENT', ink:'#D8392C', onInk:'#FFF3E6', hours:'15–22', acts:[\n        A('15:00','22:00','RANDOM B2B', ['COMISARIO','NAKO ONO','OLINSTVÍ + SECRET GUEST']),\n      ]},\n      { name:'THE CELLAR BY KOMIKS', ink:'#4B6398', onInk:'#EAEFF8', hours:'19–08', acts:[\n        A('21:00','22:00','SURPRISE MIXUP'),\n        A('22:00','23:30','UNCALLED4'),\n        A('23:30','00:30','HRTL — LIVE'),\n        A('00:30','02:30','THC'),\n        A('02:30','03:30','ARAS & ALIVER — LIVE'),\n        A('03:30','04:30','DDK'),\n        A('04:30','06:00','SJ YELLOW'),\n        A('06:00','08:00','ATLASKIN'),\n      ]},\n      { name:'THE MILL', ink:'#E0902A', onInk:'#1C1304', hours:'21–07', acts:[\n        A('21:00','22:30','YACHYM B2B SIMEONE', null, 'LDSB'),\n        A('22:30','00:00','SMB B2B SILVERBO1', null, 'LDSB'),\n        A('00:00','02:00','NOCHAV B2B MELDABOI', null, 'LDSB'),\n        A('02:00','03:30','AVHD', null, 'KITCHEN'),\n        A('03:30','05:30','ISHKA MACHINA B2B TAKĒ', null, 'KITCHEN'),\n        A('05:30','07:00','DJAMES', null, 'KITCHEN'),\n      ]},\n    ];\n  }\n\n  _block(a, now, ink, onInk, cardBase){\n    let status = 'future';\n    if (now >= a.end) status = 'past';\n    else if (now >= a.start) status = 'now';\n    const isNow = status === 'now';\n    const left = this._off(a.start)*this.PXH;\n    const width = (this._off(a.end) - this._off(a.start))*this.PXH;\n    // shrink name font so long titles fit narrow (short) cells\n    const usable = width - 7 - 22 - 5;\n    let nm = a.name; let isLive = false;\n    const lm = nm.match(/^(.*?)\\s*[—-]\\s*LIVE\\s*$/);\n    if (lm){ nm = lm[1]; isLive = true; }\n    let nameFs = 13;\n    const approx = nm.length * nameFs * 0.56; // px on one line\n    if (approx > usable * 1.7) nameFs = 11.5;     // tight in 2 lines → shrink\n    if (approx > usable * 2.3) nameFs = 10;\n    const base = {\n      position:'absolute', top:'8px', height:(this.LANE-16)+'px',\n      left: (left+3)+'px', width:(width-7)+'px',\n      borderRadius:'11px', padding:'9px 11px', overflow:'hidden', boxSizing:'border-box',\n      display:'flex', flexDirection:'column', gap:'2px', cursor:'default',\n      transition:'background .5s, color .5s, opacity .4s, box-shadow .3s'\n    };\n    if (isNow){\n      Object.assign(base, { background:ink, color:onInk, boxShadow:'4px 5px 0 var(--ink,#17131F)', zIndex:3 });\n    } else {\n      Object.assign(base, { background:this._blend(ink, cardBase, 0.52), color:'var(--ink,#17131F)', boxShadow:'inset 5px 0 0 '+ink+', 0 1px 3px rgba(0,0,0,.12)' });\n      if (status === 'past') base.opacity = 0.42;\n    }\n    return {\n      style: base,\n      time: this._hhmm(a.start)+'–'+this._hhmm(a.end),\n      name: nm, isLive,\n      liveStyle: { fontFamily:\"'Space Mono',monospace\", fontSize:'7.5px', fontWeight:700, letterSpacing:'.1em', padding:'1px 5px', borderRadius:'999px', background: isNow ? this._ra('#000',0.18) : this._ra(ink,0.28), color: isNow ? onInk : 'var(--ink,#17131F)', flex:'none' },\n      subLine: (a.sub || []).join(', '), hasSub: !!(a.sub && a.sub.length),\n      tag: a.tag || '', hasTag: !!a.tag,\n      showBadge: isNow,\n      timeStyle: { fontFamily:\"'Space Mono',monospace\", fontSize:'9.5px', fontWeight:700, letterSpacing:'.04em', whiteSpace:'nowrap', opacity: isNow?0.92:0.6, textDecoration: status==='past'?'line-through':'none' },\n      nameStyle: { flex:'none', fontFamily:\"'Syne',sans-serif\", fontWeight:800, fontSize:nameFs+'px', lineHeight:1.1, letterSpacing:'-.02em', textTransform:'uppercase', textWrap:'pretty', overflow:'hidden', marginTop:'1px' },\n      subStyle: { flex:'none', fontFamily:\"'Space Mono',monospace\", fontSize:'10px', opacity:0.78, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', marginTop:'2px' },\n      tagStyle: { position:'absolute', top:'8px', right:'9px', fontFamily:\"'Space Mono',monospace\", fontSize:'7.5px', fontWeight:700, letterSpacing:'.1em', padding:'2px 6px', borderRadius:'999px', background: isNow ? this._ra('#000',0.16) : this._ra(ink,0.2), opacity: isNow?0.9:0.7 }\n    };\n  }\n\n  renderVals(){\n    const now = this.state.now;\n    const PXH=this.PXH, SPAN=this.SPAN, CORNER=this.CORNER, LANE=this.LANE, RULER=this.RULER;\n    const trackW = SPAN*PXH;\n    const stages = this._stages();\n    const t = this._nightness(now);\n    const cardBase = this._lt('#FBF4E1','#181527', t);\n\n    // day holds the base paper tone, then breaks into darker dusk/night around 20:00–22:00 (8–10 PM)\n    const duskWash = 'linear-gradient(90deg, transparent 0%, transparent 33%, '+this._ra('#4B6398',0.07)+' 42%, '+this._ra('#2A2C66',0.18)+' 62%, '+this._ra('#130E33',0.40)+' 100%)';\n    const grid = 'repeating-linear-gradient(90deg, var(--line,rgba(0,0,0,.08)) 0, var(--line,rgba(0,0,0,.08)) 1px, transparent 1px, transparent '+PXH+'px)';\n    const lanes = stages.map((s,i) => {\n      const live = s.acts.some(a => now >= a.start && now < a.end);\n      return {\n      name: s.name, hours: s.hours, live,\n      labelStyle: { position:'sticky', left:'0', width:CORNER+'px', minWidth:CORNER+'px', height:LANE+'px', zIndex:4,\n        background:'var(--paper,#EFE3C8)', borderBottom:'1px solid var(--line,rgba(0,0,0,.1))', borderRight:'2px solid var(--line,rgba(0,0,0,.16))', borderLeft:'6px solid '+s.ink,\n        display:'flex', flexDirection:'column', justifyContent:'center', gap:'5px', padding:'0 10px', overflow:'hidden' },\n      dotStyle: live\n        ? { width:'9px', height:'9px', borderRadius:'50%', background:'#FF3B3B', flex:'none', boxShadow:'0 0 0 3px '+this._ra('#FF3B3B',0.25), animation:'blink 1s steps(1) infinite' }\n        : { display:'none' },\n      nameStyle: { fontFamily:\"'Syne',sans-serif\", fontWeight:800, fontSize:'10.5px', lineHeight:1.12, letterSpacing:'-.02em', textTransform:'uppercase', color:s.ink, overflowWrap:'normal', wordBreak:'normal', overflow:'hidden' },\n      trackStyle: { position:'relative', width:trackW+'px', height:LANE+'px',\n        borderBottom:'1px solid var(--line,rgba(0,0,0,.1))',\n        backgroundColor:this._ra(s.ink,0.15),\n        backgroundImage: duskWash+', '+grid },\n      blocks: s.acts.map(
